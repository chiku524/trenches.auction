# Repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN — User token (Profile → API Tokens) or account-owned token with
#     Workers Scripts + D1 + R2 for this account. See comments below.
#
# Account ID for deploy is set in wrangler.jsonc (`account_id`). Do NOT pass
# CLOUDFLARE_ACCOUNT_ID in CI unless you intend to override it — a wrong value causes
# /accounts/{id}/workers/... calls against the wrong account while the token is tied to
# another, which yields Authentication error [10000]. GitHub also masks secret substrings in
# logs as ***; that is normal and does not mean Wrangler is using asterisks literally.
#
# ---
# Why you may see BOTH [10000] on /workers/services AND [9106] on /memberships
#
# The first error is the real one: Cloudflare rejected the Workers API call (bad token, wrong
# account ID for the request, or token not allowed to manage Workers on that account).
# Wrangler may then print extra diagnostics that call user-only endpoints; Account API Tokens
# cannot use /memberships, so you can see [9106] even after account id is set — focus on fixing
# [10000] first.
#
# ---
# Token type (important)
#
# - User API token (recommended for CI): https://dash.cloudflare.com/profile/api-tokens
#   Use template "Edit Cloudflare Workers", then add Account → D1 → Edit and
#   Account → Workers R2 Storage → Edit.
#
# - Account-owned API token: https://dash.cloudflare.com/?to=/:account/api-tokens
#   Must include Workers Scripts → Edit, D1 → Edit, R2 → Edit. Under "Account Resources",
#   include this account (or All accounts). See https://github.com/cloudflare/workers-sdk/issues/9129
#
# ---
# Creating a token via CLI
#
# Wrangler does not create long-lived API tokens. Use the dashboard, or Cloudflare's HTTP API:
# https://developers.cloudflare.com/fundamentals/api/how-to/create-via-api/
#
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

concurrency:
  group: cloudflare-workers-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Cloudflare API token secret
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is empty. Add it under Repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Build web (Vite)
        run: npm run build:web

      - name: Deploy Worker
        run: ./node_modules/.bin/wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
