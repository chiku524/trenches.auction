# Repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN — User token (Profile → API Tokens) or account-owned token with
#     Workers Scripts + D1 + R2 for this account. See comments below.
#
# Account ID for deploy is set in wrangler.jsonc (`account_id`). Do NOT pass
# CLOUDFLARE_ACCOUNT_ID in CI unless you intend to override it — a wrong value causes
# /accounts/{id}/workers/... calls against the wrong account while the token is tied to
# another, which yields Authentication error [10000]. GitHub also masks secret substrings in
# logs as ***; that is normal and does not mean Wrangler is using asterisks literally.
#
# ---
# Why you may see BOTH [10000] on /workers/services AND [9106] on /memberships
#
# The first error is the real one: Cloudflare rejected the Workers API call (bad token, wrong
# account ID for the request, or token not allowed to manage Workers on that account).
# Wrangler may then print extra diagnostics that call user-only endpoints; Account API Tokens
# cannot use /memberships, so you can see [9106] even after account id is set — focus on fixing
# [10000] first.
#
# ---
# Token type (important)
#
# - User API token (recommended for CI): https://dash.cloudflare.com/profile/api-tokens
#   Use template "Edit Cloudflare Workers", then add Account → D1 → Edit and
#   Account → Workers R2 Storage → Edit.
#
# - Account-owned API token: https://dash.cloudflare.com/?to=/:account/api-tokens
#   Use template "Edit Cloudflare Workers", then add D1 + R2 as above. Critical scopes:
#     Account → Workers Scripts → Edit  (required for /workers/services — without it you get [10000])
#     Account → Workers Builds Configuration → Edit  (often required for modern `wrangler deploy`, esp. with assets)
#   Under "Account Resources": Include → this account (or All accounts).
#   Under "Zone Resources": prefer Include → All zones for that account — zone-only tokens often fail deploy with [10000] even when account is correct.
#   See https://github.com/cloudflare/workers-sdk/issues/9129
#
# ---
# Creating a token via CLI
#
# Wrangler does not create long-lived API tokens. Use the dashboard, or Cloudflare's HTTP API:
# https://developers.cloudflare.com/fundamentals/api/how-to/create-via-api/
#
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

concurrency:
  group: cloudflare-workers-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Cloudflare API token secret
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is empty. Add it under Repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      # Lists permission group names Cloudflare associates with this token (no token value printed).
      # Account-owned tokens may fail this endpoint — that is expected; use a User token from Profile for CI if unsure.
      - name: Cloudflare token — permission names (debug)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 <<'PY'
          import json, os, urllib.error, urllib.request
          req = urllib.request.Request(
              "https://api.cloudflare.com/client/v4/user/tokens/verify",
              headers={"Authorization": f"Bearer {os.environ['CLOUDFLARE_API_TOKEN']}"},
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  data = json.load(resp)
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print("verify HTTP error:", e.code, body[:500])
              raise SystemExit(0)
          print("success:", data.get("success"))
          if data.get("errors"):
              print("errors:", data["errors"])
          res = data.get("result") or {}
          names = []
          for pol in res.get("policies") or []:
              for g in pol.get("permission_groups") or []:
                  n = g.get("name")
                  if n:
                      names.append(n)
          print("permission_groups:", sorted(set(names)))
          PY

      - name: Build web (Vite)
        run: npm run build:web

      - name: Deploy Worker
        run: ./node_modules/.bin/wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
