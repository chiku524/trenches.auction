# Repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_ACCOUNT_ID — Workers dashboard → sidebar or URL (32-character hex, no quotes)
#   CLOUDFLARE_API_TOKEN — see below
#
# ---
# Why you may see BOTH [10000] on /workers/services AND [9106] on /memberships
#
# The first error is the real one: Cloudflare rejected the Workers API call (bad token, wrong
# account ID in CLOUDFLARE_ACCOUNT_ID, or token not allowed to manage Workers on that account).
# Wrangler may then print extra diagnostics that call user-only endpoints; Account API Tokens
# cannot use /memberships, so you can see [9106] even after account id is set — focus on fixing
# [10000] first.
#
# ---
# Token type (important)
#
# - User API token (recommended for CI): https://dash.cloudflare.com/profile/api-tokens
#   Use template "Edit Cloudflare Workers", then add Account → D1 → Edit and
#   Account → Workers R2 Storage → Edit. Includes user scopes Wrangler may use for diagnostics.
#
# - Account-owned API token: https://dash.cloudflare.com/?to=/:account/api-tokens
#   Must include Workers Scripts → Edit, D1 → Edit, R2 → Edit for this project. Under "Account
#   Resources", include this account (or All accounts). These tokens cannot call /memberships;
#   you MUST set CLOUDFLARE_ACCOUNT_ID (this workflow enforces length) or `account_id` in
#   wrangler.jsonc — see https://github.com/cloudflare/workers-sdk/issues/9129
#
# ---
# Creating a token via CLI
#
# Wrangler does not create long-lived API tokens. Use the dashboard, or Cloudflare's HTTP API
# with an existing credential that is allowed to create tokens:
# https://developers.cloudflare.com/fundamentals/api/how-to/create-via-api/
#
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

concurrency:
  group: cloudflare-workers-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Cloudflare secrets (shape only)
        env:
          ACCT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is empty. Add it under Repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          acct_len=${#ACCT}
          if [ "$acct_len" -ne 32 ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID must be exactly 32 characters (got length ${acct_len}). Copy it from Workers → Overview; remove quotes/whitespace from the secret."
            exit 1
          fi
          case "$ACCT" in
            *[![:xdigit:]]*)
              echo "::error::CLOUDFLARE_ACCOUNT_ID must be hexadecimal (0-9, a-f). Check for typos or stray characters."
              exit 1
              ;;
          esac

      - name: Build web (Vite)
        run: npm run build:web

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.84.0"
          command: deploy
