# Repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_ACCOUNT_ID — Workers overview URL or dashboard sidebar (32-char hex)
#   CLOUDFLARE_API_TOKEN — Create at https://dash.cloudflare.com/profile/api-tokens
#
# If deploy fails with Authentication error [10000] or memberships [9106], the token is missing
# scopes or is not an Account API token. Use "Create Custom Token" and include at minimum:
#   Account  → Workers Scripts              → Edit
#   Account  → Workers Tail                 → Read   (optional; helps wrangler tail)
#   Account  → D1                           → Edit   (this project uses D1)
#   Account  → Workers R2 Storage           → Edit   (R2 bucket binding)
#   Account  → Workers Builds Configuration → Edit   (if wrangler/version needs it)
#   Account  → Account Settings             → Read   (often required for account resolution)
#   User     → Memberships                 → Read   (fixes some wrangler whoami / 9106 errors)
#
# Quick path: "Create Token" → use template "Edit Cloudflare Workers", then Edit token and add
# D1 Edit + Workers R2 Storage Edit + User Memberships Read if deploy still fails.
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

concurrency:
  group: cloudflare-workers-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web + deploy Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
